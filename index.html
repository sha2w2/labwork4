<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Finder App</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 100px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-container {
            text-align: center;
            margin: 30px 0;
        }

        #bookInput {
            width: 70%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f8f8f8;
            cursor: pointer;
        }

        button:hover {
            background: #e8e8e8;
        }

        #results {
            margin-top: 20px;
            display: grid;
            gap: 10px;
        }

        .book {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div style="text-align: center; margin-bottom: 100px; font-size: 4em; font-weight: bold;">Book Finder App</div>
    <h1 style="text-align: center;">Google Books Search</h1>

    <div class="search-container">
        <input type="text" id="bookInput" placeholder="Enter book title..."
            onkeydown="if(event.key === 'Enter') findBooks()">
        <button onclick="findBooks()">Search</button>
    </div>

    <div id="results">
    </div>

    <script src="script.js"></script>
</body>

</html>
